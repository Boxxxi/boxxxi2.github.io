<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    
    <title>Project Article</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
        }

        .article-container {
            max-width: 820px;
            margin: 5rem auto 3rem;
            padding: 3rem 3.25rem;
            background: var(--glass-fill);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border-top);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            position: relative;
            z-index: 1;
        }

        .article-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.04), transparent 50%);
            pointer-events: none;
        }

        .article-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border-top);
            position: relative;
        }

        .article-title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 400;
            color: var(--text);
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
            line-height: 1.15;
        }

        .article-meta {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: lowercase;
        }

        .article-content {
            line-height: 1.85;
            color: var(--text-2);
            font-weight: 300;
            font-size: 1.05rem;
            position: relative;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            font-family: var(--font-display);
            color: var(--text);
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .article-content h1 {
            font-size: 2.1rem;
            margin: 2.25rem 0 1rem;
        }

        .article-content h2 {
            font-size: 1.65rem;
            margin: 2rem 0 1rem;
        }

        .article-content h3 {
            font-size: 1.3rem;
            margin: 1.5rem 0 0.75rem;
        }

        .article-content p {
            margin-bottom: 1.1rem;
        }

        .article-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(125, 211, 252, 0.3);
            transition: var(--transition);
        }

        .article-content a:hover {
            border-bottom-color: var(--accent);
            text-shadow: 0 0 12px rgba(125, 211, 252, 0.5);
        }

        .article-content strong {
            color: var(--text);
            font-weight: 500;
        }

        .article-content em {
            color: var(--text);
            font-style: italic;
        }

        .article-content code {
            background: var(--glass-fill);
            border: 1px solid var(--glass-border-top);
            color: var(--accent);
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.88rem;
        }

        .article-content pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border-top);
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
            color: var(--text);
            padding: 1.25rem 1.5rem;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: 1.25rem 0;
            font-family: var(--font-mono);
            font-size: 0.88rem;
            line-height: 1.65;
        }

        .article-content pre code {
            background: none;
            border: none;
            color: var(--text);
            padding: 0;
        }

        .article-content blockquote {
            border-left: 2px solid var(--accent);
            background: rgba(125, 211, 252, 0.04);
            padding: 0.75rem 1.25rem;
            margin: 1.25rem 0;
            font-style: italic;
            color: var(--text-2);
            border-radius: 0 8px 8px 0;
        }

        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.25rem 0;
            background: var(--glass-fill);
            border-radius: 8px;
            overflow: hidden;
        }

        .article-content th,
        .article-content td {
            border: 1px solid var(--glass-border-top);
            padding: 0.7rem 0.9rem;
            text-align: left;
            font-size: 0.95rem;
        }

        .article-content th {
            background: var(--glass-fill-strong);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .article-content ul,
        .article-content ol {
            margin: 1rem 0;
            padding-left: 1.75rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
        }

        .article-content ul li::marker {
            color: var(--accent);
        }

        .article-content img {
            max-width: 100%;
            border-radius: var(--border-radius);
            border: 1px solid var(--glass-border-top);
            margin: 1.25rem 0;
        }

        .article-content hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border-top), transparent);
            margin: 2rem 0;
        }

        .back-button {
            position: fixed;
            top: 1.75rem;
            left: 1.75rem;
            background: var(--glass-fill);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text);
            padding: 0.65rem 1.25rem;
            border: 1px solid var(--glass-border-top);
            border-radius: 999px;
            text-decoration: none;
            font-family: var(--font-mono);
            font-weight: 400;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            text-transform: lowercase;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-button:hover {
            transform: translateY(-2px);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 22px rgba(125, 211, 252, 0.35);
        }

        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.92rem;
        }

        .loading h2 {
            font-family: var(--font-display);
            color: var(--text);
            font-weight: 400;
            margin-bottom: 0.75rem;
        }

        @media (max-width: 768px) {
            .article-container {
                margin: 4rem 1rem 2rem;
                padding: 1.75rem 1.5rem;
                border-radius: var(--border-radius);
            }

            .article-title {
                font-size: 1.8rem;
                line-height: 1.2;
            }

            .article-header {
                margin-bottom: 2rem;
                padding-bottom: 1.5rem;
            }

            .article-content {
                font-size: 0.95rem;
                line-height: 1.7;
            }

            .article-content h1 {
                font-size: 1.6rem;
                margin: 1.5rem 0 0.8rem 0;
            }

            .article-content h2 {
                font-size: 1.3rem;
                margin: 1.2rem 0 0.7rem 0;
            }

            .article-content h3 {
                font-size: 1.1rem;
                margin: 1rem 0 0.6rem 0;
            }

            .article-content p {
                margin-bottom: 0.8rem;
            }

            .article-content code {
                font-size: 0.85rem;
                padding: 0.15rem 0.3rem;
            }

            .article-content pre {
                padding: 0.8rem;
                font-size: 0.85rem;
                margin: 0.8rem 0;
            }

            .article-content ul,
            .article-content ol {
                margin: 0.8rem 0;
                padding-left: 1.5rem;
            }

            .article-content li {
                margin-bottom: 0.4rem;
            }

            .article-content table {
                font-size: 0.85rem;
            }

            .article-content th,
            .article-content td {
                padding: 0.4rem;
            }

            .back-button {
                top: 1rem;
                left: 1rem;
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
                min-width: 44px;
                min-height: 44px;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .loading {
                padding: 2rem 1rem;
            }
        }

        @media (max-width: 480px) {
            .article-container {
                margin: 0.5rem;
                padding: 1rem;
            }

            .article-title {
                font-size: 1.6rem;
            }

            .article-content {
                font-size: 0.9rem;
            }

            .article-content h1 {
                font-size: 1.4rem;
            }

            .article-content h2 {
                font-size: 1.2rem;
            }

            .article-content h3 {
                font-size: 1rem;
            }

            .back-button {
                top: 0.8rem;
                left: 0.8rem;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Atmosphere: aurora nebulae + grain -->
    <div class="atmosphere" aria-hidden="true">
        <div class="nebula"></div>
        <div class="grain"></div>
        <div class="vignette"></div>
    </div>

    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> back to portfolio
    </a>

    <div class="article-container">
        <div class="article-header">
            <h1 class="article-title" id="article-title">Loading...</h1>
            <div class="article-meta" id="article-meta">Loading article...</div>
        </div>
        <div class="article-content" id="article-content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading article content...
            </div>
        </div>
    </div>

    <script>
        // Get article parameter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const articlePath = urlParams.get('article');

        // Security: Whitelist of allowed articles to prevent directory traversal
        const allowedArticles = [
            'articles/auto-regexify.md',
            'articles/entity-labelling.md',
            'articles/merchant-categorization.md',
            'articles/sms-classification.md',
            'articles/adversarial-cognitive-manipulation.md',
            'articles/birdclef-2026.md',
            'articles/nyc-street-fix.md',
            'articles/physics-video-generation.md'
        ];

        if (!articlePath || !allowedArticles.includes(articlePath)) {
            document.getElementById('article-content').innerHTML = `
                <div class="loading">
                    <h2>Article Not Found</h2>
                    <p>No article specified or invalid article path. Please go back and select an article.</p>
                </div>
            `;
        } else {
            // Load the markdown file
            fetch(articlePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Article not found');
                    }
                    return response.text();
                })
                .then(markdown => {
                    // Convert markdown to HTML
                    const html = marked.parse(markdown);
                    
                    // Extract title from first h1
                    const titleMatch = markdown.match(/^# (.+)$/m);
                    const title = titleMatch ? titleMatch[1] : 'Article';
                    
                    // Security: Use textContent for title to prevent XSS
                    document.getElementById('article-title').textContent = title;
                    document.getElementById('article-meta').textContent = `Technical Article • ${new Date().toLocaleDateString()}`;
                    
                    // Security: Basic XSS protection - only allow safe HTML tags
                    const sanitizedHtml = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                                             .replace(/<iframe\b[^<]*(?:(?!<\/iframe>)<[^<]*)*<\/iframe>/gi, '')
                                             .replace(/javascript:/gi, '')
                                             .replace(/on\w+\s*=/gi, '');
                    
                    document.getElementById('article-content').innerHTML = sanitizedHtml;
                    
                    // Update page title safely
                    document.title = title;
                })
                .catch(error => {
                    console.error('Error loading article:', error);
                    document.getElementById('article-content').innerHTML = `
                        <div class="loading">
                            <h2>Error Loading Article</h2>
                            <p>The article could not be loaded. Please check the URL and try again.</p>
                            <p>Error: ${error.message}</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
